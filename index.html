<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Agent Hollingsworth</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background-color: #0d0d0d;
      color: #e0e0e0;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .container {
      text-align: center;
      padding: 2rem;
    }

    h1 {
      font-size: 4rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: #ffffff;
      text-shadow: 0 0 20px rgba(100, 180, 255, 0.4);
    }

    .subtitle {
      font-size: 1.25rem;
      color: #888;
      margin-top: 0.75rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
    }

    .divider {
      width: 80px;
      height: 2px;
      background: linear-gradient(to right, transparent, #4a9eff, transparent);
      margin: 1.5rem auto;
    }

    .name {
      font-size: 1.5rem;
      color: #4a9eff;
      letter-spacing: 0.05em;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Agent Hollingsworth</h1>
    <div class="divider"></div>
    <p class="name">Jamal Hollingsworth</p>
    <p class="subtitle">Welcome</p>
  </div>
</body>
</html>
